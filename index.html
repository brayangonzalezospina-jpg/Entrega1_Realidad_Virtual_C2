<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Escena XR Industrial</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- Movimiento -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<!-- Físicas -->
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

<!-- Animaciones GLTF -->
<script src="https://cdn.jsdelivr.net/npm/aframe-animation-mixer@6.1.1/dist/aframe-animation-mixer.min.js"></script>

</head>

<body>

<a-scene physics="gravity: -9.8">

<!-- ================== -->
<!-- ASSETS -->
<!-- ================== -->

<a-assets>

<a-asset-item id="robot" src="models/industrial_robot_arm.glb"></a-asset-item>

<a-asset-item id="robotAnimado" src="models/robot_arm_animation.glb"></a-asset-item>

<a-asset-item id="drone" src="models/drone_futuriste.glb"></a-asset-item>

<a-asset-item id="cnc" src="models/simple_rubber_conveyor.glb"></a-asset-item>

<a-asset-item id="estella" src="models/cutter_machine.glb"></a-asset-item>

</a-assets>


<!-- ================== -->
<!-- CIELO -->
<!-- ================== -->

<a-sky color="#ECECEC"></a-sky>


<!-- ================== -->
<!-- PISO -->
<!-- ================== -->

<a-plane
rotation="-90 0 0"
width="30"
height="30"
color="#7BC8A4"
static-body>
</a-plane>


<!-- ================== -->
<!-- ROBOT INDUSTRIAL -->
<!-- ================== -->

<a-entity
gltf-model="#robot"
animation-mixer
position="3 0 -5"
scale="0.05 0.05 0.05">
</a-entity>


<!-- ================== -->
<!-- ROBOT ANIMADO -->
<!-- ================== -->

<a-entity
gltf-model="#robotAnimado"
animation-mixer
position="0 0 6"
scale="0.05 0.05 0.05">
</a-entity>


<!-- ================== -->
<!-- CINTA TRANSPORTADORA -->
<!-- ================== -->

<a-entity
gltf-model="#cnc"
position="5 0 3"
scale="0.5 0.5 0.5"
animation="property: position;
           to: 5 0 2.5;
           dir: alternate;
           loop: true;
           dur: 2000">
</a-entity>


<!-- ================== -->
<!-- DRONE VOLADOR -->
<!-- ================== -->

<a-entity
gltf-model="#drone"
position="-4 2 2"
scale="0.3 0.3 0.3"
animation="property: position;
           to: -4 3 2;
           dir: alternate;
           loop: true;
           dur: 2000">
</a-entity>


<!-- ================== -->
<!-- MAQUINA CORTADORA -->
<!-- ================== -->

<a-entity
gltf-model="#estella"
position="-5 0 -3"
scale="0.2 0.2 0.2"
animation="property: rotation;
           to: 0 360 0;
           loop: true;
           dur: 8000;
           easing: linear">
</a-entity>


<!-- ================== -->
<!-- RIG DEL JUGADOR -->
<!-- ================== -->

<a-entity id="rig" movement-controls="speed: 0.15">

    <!-- cámara -->
    <a-entity
        camera
        position="0 1.6 0"
        look-controls>
    </a-entity>

    <!-- controlador izquierdo -->
    <a-entity
        oculus-touch-controls="hand: left">
    </a-entity>

    <!-- controlador derecho -->
    <a-entity
        oculus-touch-controls="hand: right">
    </a-entity>

</a-entity>


<!-- ================== -->
<!-- LIMITES -->
<!-- ================== -->

<a-box position="0 1 -12" depth="1" height="2" width="24" visible="false" static-body></a-box>
<a-box position="0 1 12" depth="1" height="2" width="24" visible="false" static-body></a-box>
<a-box position="12 1 0" depth="24" height="2" width="1" visible="false" static-body></a-box>
<a-box position="-12 1 0" depth="24" height="2" width="1" visible="false" static-body></a-box>


<!-- ================== -->
<!-- LUCES -->
<!-- ================== -->

<a-light type="ambient" intensity="0.5"></a-light>

<a-light
type="directional"
position="5 10 5"
intensity="0.8">
</a-light>


</a-scene>

</body>
</html>
