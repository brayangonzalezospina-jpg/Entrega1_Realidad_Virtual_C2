<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Escena XR</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

</head>

<body>

<a-scene>

<a-assets>
<a-asset-item id="robot" src="models/industrial_robot_arm.glb"></a-asset-item>
<a-asset-item id="drone" src="models/drone_futuriste.glb"></a-asset-item>
<a-asset-item id="cnc" src="models/simple_rubber_conveyor.glb"></a-asset-item>
<a-asset-item id="estella" src="models/cutter_machine.glb"></a-asset-item>
</a-assets>

<a-sky color="#ECECEC"></a-sky>

<a-plane
rotation="-90 0 0"
width="50"
height="50"
color="#7BC8A4">
</a-plane>

<a-entity
gltf-model="#robot"
position="10 0 -12"
scale="0.15 0.15 0.15">
</a-entity>

<a-entity
gltf-model="#cnc"
position="10 0 10"
scale="5 5 5">
</a-entity>

<a-entity
gltf-model="#drone"
position="-10 5 8"
scale="5 5 5">
</a-entity>

<a-entity
gltf-model="#estella"
position="-15 0 -8"
scale="0.5 0.5 0.5">
</a-entity>

<a-entity camera look-controls wasd-controls position="0 1.6 4"></a-entity>

</a-scene>

</body>
</html>
